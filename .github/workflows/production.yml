name: Publish to npm

# Publishes the package to npm whenever a GitHub Release is published.
# The published version is whatever is in package.json at the released commit,
# so bump the version and commit it BEFORE creating the release.
#
# Uses npm provenance (id-token) — required by n8n for verified community nodes
# published after 2026-05-01. Requires a valid automation/granular TOKEN_NPM secret.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TOKEN_NPM }}
